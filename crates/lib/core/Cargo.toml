[package]
name = "miden-core-lib"
version.workspace = true
description = "Miden VM core library"
documentation = "https://docs.rs/miden-core-lib"
readme = "README.md"
categories = ["cryptography", "mathematics"]
keywords = ["miden", "program", "core-lib"]
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true
edition.workspace = true

[lib]
bench = false
doctest = false

[[bench]]
name = "compilation"
harness = false

[[test]]
name = "core-lib"
path = "tests/main.rs"

[features]
default = ["std"]
std = ["miden-assembly/std", "miden-utils-sync/std"]
constraints-tools = ["std", "dep:miden-air", "dep:miden-ace-codegen"]

[dependencies]
# Miden dependencies
miden-assembly.workspace = true
miden-core.workspace = true
miden-crypto.workspace = true
miden-processor.workspace = true
miden-utils-sync.workspace = true
miden-air = { workspace = true, optional = true }
miden-ace-codegen = { workspace = true, optional = true }

# External dependencies
thiserror.workspace = true

[dev-dependencies]
criterion.workspace = true
miden-ace-codegen.workspace = true
miden-air.workspace = true
miden-processor = { workspace = true, features = ["testing"] }
miden-prover.workspace = true
miden-utils-testing.workspace = true
miden-verifier.workspace = true
num = { workspace = true }
num-bigint = { workspace = true }
pretty_assertions = { workspace = true }
rand = { workspace = true }
rand_chacha = { workspace = true }
rstest = { workspace = true }
bincode.workspace = true
serde.workspace = true
serde_json.workspace = true

[build-dependencies]
env_logger.workspace = true
fs-err = { workspace = true }
miden-assembly = { workspace = true, features = ["std"] }
miden-package-registry = { workspace = true, features = ["resolver"] }

[[bin]]
name = "regenerate-constraints"
path = "src/bin/regenerate-constraints.rs"
required-features = ["constraints-tools"]
