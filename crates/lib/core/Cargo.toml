[package]
name = "miden-core-lib"
version = "0.28.0"
description = "Miden VM core library"
documentation = "https://docs.rs/miden-core-lib"
readme = "README.md"
categories = ["cryptography", "mathematics"]
keywords = ["miden", "program", "core-lib"]
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true
edition.workspace = true

[lib]
bench = false
doctest = false

[[bench]]
name = "compilation"
harness = false

[[test]]
name = "core-lib"
path = "tests/main.rs"

[features]
default = ["std"]
arbitrary = ["std", "miden-assembly/testing", "miden-utils-testing/arbitrary"]
std = [
    "miden-assembly/std",
    "miden-precompiles/std",
    "miden-processor/std",
    "miden-utils-sync/std",
]
testing = ["arbitrary"]
constraints-tools = ["std", "dep:miden-air", "dep:miden-ace-codegen"]
metal = ["miden-prover/metal"]

[dependencies]
# Miden dependencies
miden-mast-package.workspace = true
miden-core.workspace = true
miden-crypto.workspace = true
miden-precompiles.workspace = true
miden-processor.workspace = true
miden-utils-sync.workspace = true
miden-air = { workspace = true, optional = true }
miden-ace-codegen = { workspace = true, optional = true }

# External dependencies
thiserror.workspace = true

[dev-dependencies]
miden-prover = { workspace = true, features = ["concurrent"] }
miden-signature = { git = "https://github.com/0xMiden/miden-signature.git", rev = "5fe9334dd19bd48948c4fea23f5de70d04fcc091" }
p3-field = { version = "0.6", default-features = false }
p3-goldilocks = { version = "0.6", default-features = false }
p3-symmetric = { version = "0.6", default-features = false }
criterion.workspace = true
miden-ace-codegen.workspace = true
miden-air.workspace = true
miden-assembly = { workspace = true, features = ["testing"] }
miden-core-lib-codegen = { workspace = true, features = ["std"] }
miden-package-registry = { workspace = true, features = ["resolver"] }
miden-processor = { workspace = true, features = ["testing"] }
miden-utils-testing.workspace = true
num = { workspace = true }
rand = { workspace = true, features = ["std", "std_rng", "thread_rng"] }
rand_chacha = { workspace = true }
rstest = { workspace = true }
tracing-subscriber.workspace = true

[build-dependencies]
env_logger.workspace = true
fs-err = { version = "3.1" }
miden-assembly = { workspace = true, features = ["std"] }
miden-assembly-syntax = { workspace = true, features = ["std"] }
miden-package-registry = { workspace = true, features = ["resolver"] }
miden-core-lib-codegen = { workspace = true, features = ["std"] }

[[bin]]
name = "regenerate-constraints"
path = "src/bin/regenerate-constraints.rs"
required-features = ["constraints-tools"]
