[package]
name = "miden-utils-diagnostics"
version = "0.25.5"
description = "Diagnostic infrastructure used in the Miden assembler and VM"
documentation = "https://docs.rs/miden-utils-diagnostics"
readme = "README.md"
categories = ["compilers", "no-std"]
keywords = ["diagnostic", "error", "span"]
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
exclude.workspace = true

[features]
default = ["std"]
std = ["miette/fancy-no-syscall", "miette/std", "miden-debug-types/std"]

[dependencies]
miden-debug-types.workspace = true
miette = { workspace = true, features = [
    "fancy-no-syscall",
    "derive",
] }
tracing.workspace = true
