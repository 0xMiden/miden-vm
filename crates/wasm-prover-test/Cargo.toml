[package]
name = "miden-wasm-prover-test"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[dependencies]

[dev-dependencies]
miden-assembly = { path = "../../crates/assembly", default-features = false }
miden-processor = { path = "../../processor", default-features = false }
miden-prover = { path = "../../prover", default-features = false }
miden-core = { path = "../../core", default-features = false }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
wasm-bindgen-test = "0.3"
getrandom = { version = "0.2", features = ["js"] }

# TODO: remove once fix is upstreamed to Plonky3
[patch.crates-io]
p3-challenger = { git = "https://github.com/igamigo/Plonky3.git", branch = "fix/wasm32-grinding-usize-truncation" }
p3-field = { git = "https://github.com/igamigo/Plonky3.git", branch = "fix/wasm32-grinding-usize-truncation" }
p3-symmetric = { git = "https://github.com/igamigo/Plonky3.git", branch = "fix/wasm32-grinding-usize-truncation" }
p3-maybe-rayon = { git = "https://github.com/igamigo/Plonky3.git", branch = "fix/wasm32-grinding-usize-truncation" }
p3-monty-31 = { git = "https://github.com/igamigo/Plonky3.git", branch = "fix/wasm32-grinding-usize-truncation" }
p3-util = { git = "https://github.com/igamigo/Plonky3.git", branch = "fix/wasm32-grinding-usize-truncation" }
