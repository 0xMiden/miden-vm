[package]
name = "miden-wasm-prover-test"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
miden-assembly = { path = "../../crates/assembly", default-features = false }
miden-processor = { path = "../../processor", default-features = false }
miden-prover = { path = "../../prover", default-features = false }
miden-core = { path = "../../core", default-features = false }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["console", "Performance", "Window"] }
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[patch.crates-io]
p3-challenger = { path = "p3-challenger-patch" }
