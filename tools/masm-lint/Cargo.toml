[workspace]
members = [
    "crates/masm-analysis",
    "crates/masm-decompiler",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Miden contributors"]
homepage = "https://miden.xyz"
repository = "https://github.com/0xMiden/miden-vm"
rust-version = "1.90"

[workspace.dependencies]
clap = { version = "4.5", features = ["derive"] }
miden-assembly-syntax = { path = "../../crates/assembly-syntax", features = ["std"], default-features = false }
miden-debug-types = { path = "../../crates/debug-types", features = ["std"], default-features = false }
tracing = { version = "0.1", default-features = false, features = ["attributes"] }
tracing-log = "0.2"
tracing-subscriber = { version = "0.3", features = ["std", "env-filter", "fmt"] }
yansi = { version = "1.0" }
