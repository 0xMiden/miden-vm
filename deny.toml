# cargo-deny configuration for Miden VM workspace

# Graph configuration
[graph]
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]

# Advisory database configuration
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
  # paste crate is unmaintained but still functional; transitively used by Plonky3
  "RUSTSEC-2024-0436",
  # tracing-forest is only used by the non-published miden-bench utility crate
  "RUSTSEC-2021-0139",
]
yanked = "warn"

# License configuration
[licenses]
allow = [
  "Apache-2.0 WITH LLVM-exception",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]
exceptions = []

# Bans configuration
[bans]
allow = []
deny = []
highlight = "all"
multiple-versions = "deny"
skip = [
  # Allow duplicate spin versions - transitively pulled by p3-dft and flume
  { name = "spin" },
  # tracing-forest in miden-bench still depends on thiserror 1.x
  { name = "thiserror" },
  { name = "thiserror-impl" },
]
skip-tree = [
  # miden-crypto uses rand 0.9 while Plonky3 0.5 uses rand 0.10,
  # causing duplicate rand / rand_core / getrandom trees
  { name = "cpufeatures", version = "0.2.17" },
  { name = "getrandom", version = "=0.2.17" },
  { name = "rand", version = "=0.9.4" },
  { name = "rand_core", version = "=0.6.4" },
  { name = "rand_core", version = "=0.9.5" },
]
wildcards = "allow"

# Sources configuration
[sources]
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
unknown-git      = "deny"
unknown-registry = "deny"
