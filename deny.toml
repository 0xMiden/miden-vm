# cargo-deny configuration for Miden VM workspace

# Graph configuration
[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# Advisory database configuration
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = [
    "RUSTSEC-2024-0436", # paste is unmaintained but no alternative available
    "RUSTSEC-2021-0139", # ansi_term is pulled by tracing-forest; no patched release exists
]

# License configuration
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
]
exceptions = [
    # Each entry is the crate and version constraint, and its specific allowed licenses
    #{ allow = ["Zlib"], name = "adler32", version = "*" },
]

# Bans configuration
[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
allow = [
    #{ name = "ansi_term", version = "=0.11.0" },
]
deny = [
    #{ name = "ansi_term", version = "=0.11.0" },
]
skip = [
    # Allow duplicate spin versions - transitively pulled by p3-dft and flume
    { name = "spin" },
    # Allow duplicate rand versions - miden-crypto uses 0.10, proptest pulls 0.9
    { name = "rand" },
    { name = "rand_core" },
    { name = "rand_chacha" },
    # Allow duplicate itertools versions
    { name = "itertools" },
    # Allow duplicate shlex versions from bindgen/librocksdb-sys and cc
    { name = "shlex" },
]
skip-tree = [
    # Allow getrandom v0.3.x for now - will be updated when miden-crypto upgrades
    { name = "getrandom", version = "=0.3.4" },
    # Allow rustc_version v0.2.x - build dependency
    { name = "rustc_version", version = "=0.2.3" },
    # Allow unicode-width v0.1.x - miden-miette vs miden-formatting conflict (complex to fix)
    { name = "unicode-width", version = "=0.1.14" },
    # Allow syn v1.x and v2.x - our derive macros need v1.x while ecosystem uses v2.x
    { name = "syn", version = "=1.0.109" },
]

# Sources configuration
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
