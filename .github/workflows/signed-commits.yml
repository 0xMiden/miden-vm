# Verifies that all commits in a PR are signed (GPG or SSH).
# Delegates the actual check to the organization-level reusable workflow.

name: signed commits

permissions:
  contents: read
  pull-requests: write

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] metadata-only shared workflow, no PR checkout
    branches:
      - main
      - next
    types: [opened, reopened, synchronize]

jobs:
  check-signed-commits:
    uses: 0xMiden/.github/.github/workflows/signed-commits.yml@385c1c10c311dc0508c71d83abb0be749a2c12ca # pin@main
