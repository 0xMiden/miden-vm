name: Publish workspace to crates.io

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    if: ${{ github.repository_owner == '0xMiden' }}
    runs-on: warp-ubuntu-latest-x64-8x
    environment: release  # Optional: for enhanced security
    permissions:
      contents: read
      id-token: write  # Required for OIDC token exchange with crates.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Publish workspace crates
        uses: ./.github/actions/workspace-release
        with:
          mode: "publish"
          verify-main-head: "true"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Upload the pre-compiled artifacts (miden-vm CLI and miden-core.masp) on the
  # GitHub release page.
  # Used by midenup to speed up installs.
  upload-artifacts:
    name: upload pre-built miden-vm executable artifacts
    if: ${{ github.repository_owner == '0xMiden' }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        target: [aarch64-apple-darwin, x86_64-unknown-linux-gnu]
        exclude:
          - os: macos-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false
      - uses: ./.github/actions/cleanup-runner
      - name: Install Rust
        run: |
          rustup update --no-self-update
          rustc --version
      - name: Add target
        run: |
          rustup target add ${{ matrix.target }}
      - name: Build miden-vm
        run: |
          BUILD_TARGET=${{ matrix.target }} make exec-dist
      - name: Prepare artifact
        run: |
          mv target/${{ matrix.target }}/optimized/miden-vm miden-vm-${{ matrix.target }}
      - name: Attest miden-vm
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: miden-vm-${{ matrix.target }}
      - name: Upload
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release upload ${RELEASE_TAG} miden-vm-${{ matrix.target }}
      # Since the miden-core.masp package is triplet independent, we only build it once.
      - name: Build miden-core.masp
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          make packages
      - name: Prepare artifact
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          mv target/packages/miden-core.masp miden-core.masp
      - name: Attest miden-core.masp
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: miden-core.masp
      - name: Upload miden-core.masp
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release upload ${RELEASE_TAG} miden-core.masp
