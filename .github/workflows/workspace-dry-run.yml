name: Workspace release dry-run

on:
  push:
    branches:
      - main
      - next
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/actions/workspace-release/**"
      - ".github/workflows/workspace-dry-run.yml"
      - ".github/workflows/workspace-publish.yml"
  workflow_dispatch:
    inputs:
      packages:
        description: "Comma, space, or newline separated packages to dry-run. Empty dry-runs all publishable workspace packages."
        required: false
        default: ""
        type: string

permissions: {}

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: true

jobs:
  release-dry-run:
    if: ${{ github.repository_owner == '0xMiden' }}
    runs-on: warp-ubuntu-latest-x64-8x
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Dry-run workspace release
        uses: ./.github/actions/workspace-release
        with:
          mode: "dry-run"
          verify-main-head: "false"
          packages: ${{ github.event.inputs.packages || '' }}
          # ref left blank: uses the pushed ref
