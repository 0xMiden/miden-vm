name: Workspace release dry-run

on:
  push:
    branches:
      - main
      - next

permissions:
  contents: read
  id-token: write

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: true

jobs:
  release-dry-run:
    if: ${{ github.repository_owner == '0xMiden' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Dry-run workspace release
        uses: ./.github/actions/workspace-release
        with:
          mode: "dry-run"
          verify-main-head: "false"
