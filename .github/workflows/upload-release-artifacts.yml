name: Stage pre-compiled release artifacts (manual)

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to build from'
        required: true
        type: string
      tag:
        description: 'Tag name for the draft release (e.g. v0.12.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  # Create (or reuse) a draft release at the given SHA. The git tag itself is
  # only created when the draft is published.
  create-draft:
    name: create draft release
    if: ${{ github.repository_owner == '0xMiden' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create or validate draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_SHA: ${{ inputs.sha }}
        run: |
          set -e
          is_draft=$( { gh release view "${RELEASE_TAG}" --json isDraft | jq -r .isDraft; } 2>&1 )
          echo "Draft existance query: ${is_draft}"
          case "${is_draft}" in
            true)
              echo "Reusing existing draft ${RELEASE_TAG}."
              ;;
            false)
              echo "Release ${RELEASE_TAG} already exists and is published. Refusing to touch it." >&2
              exit 1
              ;;
            "release not found")
              gh release create "${RELEASE_TAG}" \
                --draft \
                --target "${RELEASE_SHA}" \
                --title "${RELEASE_TAG}"
              ;;
            *)
              echo "Unexpected output from gh release view: ${is_draft}" >&2
              exit 1
              ;;
          esac

  # Build and attach pre-compiled artifacts (miden-vm CLI and core.masp) to
  # the draft release. Re-runs are safe: uploads use --clobber.
  upload-artifacts:
    name: upload pre-built miden-vm executable artifacts
    needs: create-draft
    if: ${{ github.repository_owner == '0xMiden' }}
    environment: release  # Optional: for enhanced security
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        target: [aarch64-apple-darwin, x86_64-unknown-linux-gnu]
        exclude:
          - os: macos-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha }}
          persist-credentials: false
      - uses: ./.github/actions/cleanup-runner
      - name: Install Rust
        run: |
          rustup update --no-self-update
          rustc --version
      - name: Add target
        run: |
          rustup target add ${{ matrix.target }}
      - name: Build miden-vm
        run: |
          BUILD_TARGET=${{ matrix.target }} make exec-dist
      - name: Prepare artifact
        run: |
          mv target/${{ matrix.target }}/optimized/miden-vm miden-vm-${{ matrix.target }}
      - name: Attest miden-vm
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: miden-vm-${{ matrix.target }}
      - name: Upload
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release upload --clobber "${RELEASE_TAG}" miden-vm-${{ matrix.target }}
      # Since the core.masp package is triplet independent, we only build it once.
      - name: Install nightly
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          rustup update --no-self-update nightly
      - name: Build core.masp
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          make packages
      - name: Prepare artifact
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          mv target/packages/miden-core.masp core.masp
      - name: Attest core.masp
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: core.masp
      - name: Upload core.masp
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release upload --clobber "${RELEASE_TAG}" core.masp
