name: Upload pre-compiled release artifacts

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  # Upload the pre-compiled artifacts (miden-vm CLI and core.masp) to the
  # GitHub release page while it is still a draft.
  # **Releases must be created as drafts** so assets can be attached
  # before publishing (immutable releases).
  # Used by midenup to speed up installs.
  upload-artifacts:
    name: upload pre-built miden-vm executable artifacts
    if: ${{ github.repository_owner == '0xMiden' }}
    environment: release  # Optional: for enhanced security
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        target: [aarch64-apple-darwin, x86_64-unknown-linux-gnu]
        exclude:
          - os: macos-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false
      - uses: ./.github/actions/cleanup-runner
      - name: Install Rust
        run: |
          rustup update --no-self-update
          rustc --version
      - name: Add target
        run: |
          rustup target add ${{ matrix.target }}
      - name: Build miden-vm
        run: |
          BUILD_TARGET=${{ matrix.target }} make exec-dist
      - name: Prepare artifact
        run: |
          mv target/${{ matrix.target }}/optimized/miden-vm miden-vm-${{ matrix.target }}
      - name: Attest miden-vm
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: miden-vm-${{ matrix.target }}
      - name: Upload
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release upload --clobber "${RELEASE_TAG}" miden-vm-${{ matrix.target }}
      # Since the core.masp package is triplet independent, we only build it once.
      - name: Install nightly
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          rustup update --no-self-update nightly
      - name: Build core.masp
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          make packages
      - name: Prepare artifact
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          mv target/packages/miden-core.masp core.masp
      - name: Attest core.masp
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: core.masp
      - name: Upload core.masp
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release upload --clobber "${RELEASE_TAG}" core.masp
