# Runs linting related jobs.

name: lint

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [main, next]
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  diffs:
    name: detect changed areas
    runs-on: ubuntu-latest
    outputs:
      isCrypto: ${{ steps.diffs.outputs.isCrypto }}
      isVm: ${{ steps.diffs.outputs.isVm }}
      isRustWorkspace: ${{ steps.diffs.outputs.isRustWorkspace }}
      isFuzz: ${{ steps.diffs.outputs.isFuzz }}
      isRelease: ${{ steps.diffs.outputs.isRelease }}
      isDocsOnly: ${{ steps.diffs.outputs.isDocsOnly }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: diffs
        uses: ./.github/actions/diffs

  cargo-deny:
    name: cargo-deny on ubuntu-latest
    needs: diffs
    if: ${{ needs.diffs.outputs.isDocsOnly != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.1 --locked
      - name: Check dependencies with cargo-deny
        run: cargo deny check
      - name: Check masm-lint tool dependencies with cargo-deny
        run: make masm-lint-deny

  cargo-shear:
    name: cargo-shear on ubuntu-latest
    needs: diffs
    if: ${{ needs.diffs.outputs.isVm == 'true' || needs.diffs.outputs.isCrypto == 'true' || needs.diffs.outputs.isRustWorkspace == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install cargo-shear
        run: cargo install cargo-shear --version 1.11.2 --locked
      - name: Check for unused dependencies
        run: make shear

  workspace-inheritance:
    name: workspace inheritance on ubuntu-latest
    needs: diffs
    if: ${{ needs.diffs.outputs.isVm == 'true' || needs.diffs.outputs.isCrypto == 'true' || needs.diffs.outputs.isRustWorkspace == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Do not pin taiki-e's moving tool shortcut tags by hash. Pin a released
      # install-action commit and set tool explicitly, or zizmor's
      # impostor-commit audit can flag stale shortcut-tag hashes.
      - name: Install cargo-binstall
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-binstall
      - name: Install workspace inheritance checker
        run: cargo binstall --no-confirm cargo-workspace-inheritance-check@1.2.0
      - name: Check workspace inheritance
        run: cargo workspace-inheritance-check --promotion-threshold 2 --promotion-failure

  masm-lint:
    name: masm-lint on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Install rust
        run: |
          rustup update --no-self-update
          rustup component add clippy
      - name: Clippy masm-lint tool workspace
        run: make masm-lint-clippy
      - name: Lint MASM core library
        run: make masm-lint-core

  clippy:
    name: clippy stable on ubuntu-latest
    needs: diffs
    if: ${{ needs.diffs.outputs.isVm == 'true' || needs.diffs.outputs.isCrypto == 'true' || needs.diffs.outputs.isRustWorkspace == 'true' }}
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Clippy
        run: |
          rustup update --no-self-update stable
          rustup +stable component add clippy
          make clippy

  rustfmt:
    name: rustfmt check nightly on ubuntu-latest
    needs: diffs
    if: ${{ needs.diffs.outputs.isVm == 'true' || needs.diffs.outputs.isCrypto == 'true' || needs.diffs.outputs.isRustWorkspace == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Rustfmt
        run: |
          rustup update --no-self-update nightly
          rustup +nightly component add rustfmt
          make format-check

  doc:
    name: doc stable on ubuntu-latest
    needs: diffs
    if: ${{ needs.diffs.outputs.isVm == 'true' || needs.diffs.outputs.isCrypto == 'true' || needs.diffs.outputs.isRustWorkspace == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Build docs
        run: |
          rustup +stable update --no-self-update
          rustup default stable
          make doc
