name: Deploy GitHub Pages redirect

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Generate redirect site
        run: |
          mkdir _site

          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Redirecting to docs.miden.xyz</title>
            <link rel="canonical" href="https://docs.miden.xyz/miden-vm/">
            <meta http-equiv="refresh" content="0; url=https://docs.miden.xyz/miden-vm/">
          </head>
          <body>
            <h1>Miden VM Documentation Has Moved</h1>
            <p>This site has moved to
               <a href="https://docs.miden.xyz/miden-vm/">docs.miden.xyz/miden-vm</a>.
               You will be redirected automatically.</p>
          </body>
          </html>
          EOF

          cat > _site/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Redirecting to docs.miden.xyz</title>
            <link rel="canonical" href="https://docs.miden.xyz/miden-vm/">
            <script>
              var defined_path = window.location.pathname;
              var rel = defined_path.replace(/^\/miden-vm\/?/, '');
              var target = 'https://docs.miden.xyz/miden-vm/' + rel;
              target += window.location.search + window.location.hash;
              window.location.replace(target);
            </script>
            <noscript>
              <meta http-equiv="refresh" content="0; url=https://docs.miden.xyz/miden-vm/">
            </noscript>
          </head>
          <body>
            <h1>Miden VM Documentation Has Moved</h1>
            <p>This site has moved to
               <a href="https://docs.miden.xyz/miden-vm/">docs.miden.xyz/miden-vm</a>.
               You will be redirected automatically.</p>
          </body>
          </html>
          EOF

          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
