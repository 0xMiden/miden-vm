name: Deploy GitHub Pages redirect

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Generate redirect site
        run: |
          mkdir _site

          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Redirecting to docs.miden.xyz</title>
            <link rel="canonical" href="https://docs.miden.xyz/miden-vm/">
            <meta http-equiv="refresh" content="0; url=https://docs.miden.xyz/miden-vm/">
          </head>
          <body>
            <h1>Miden VM Documentation Has Moved</h1>
            <p>This site has moved to
               <a href="https://docs.miden.xyz/miden-vm/">docs.miden.xyz/miden-vm</a>.
               You will be redirected automatically.</p>
          </body>
          </html>
          EOF

          mkdir -p _site/docs

          cat > _site/docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Miden VM - Docs Subdirectory</title>
          </head>
          <body>
            <h1>Miden VM Docs</h1>
            <p>Placeholder for future rustdoc and other documentation.</p>
          </body>
          </html>
          EOF

          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
