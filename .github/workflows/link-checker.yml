# Checks documentation for broken links once per day and creates issues if broken links are found
name: Check documentation links

on:
  workflow_call:
    inputs:
      fail-fast:
        required: false
        default: false
        type: boolean
  schedule:
    # runs once a day at 01:00 UTC (adjust as needed)
    - cron: '0 1 * * *'

permissions: {}

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set fail-fast flag depending on trigger
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "fail_fast=false" >> "$GITHUB_OUTPUT"
          else
            echo "fail_fast=${{ inputs.fail-fast }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          fail: ${{ steps.flags.outputs.fail_fast }}
          args: |
            --verbose
            --exclude "localhost"
            --exclude "127.0.0.1"
            --exclude "^file://"
            --exclude "github.com/0xMiden/.*"
            --exclude "medium.com"
            docs/src/**/*.md
            **/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if lychee did not produce a link report
        if: steps.lychee.outputs.exit_code != '0'
        run: |
          if [ ! -s ./lychee/out.md ] || ! grep -q '^# Summary' ./lychee/out.md; then
            echo "::error::lychee exited before producing a link-check summary. Check the Link Checker step for a workflow or tool configuration error."
            exit 1
          fi

      - name: Open issue on failure (only if fail-fast is false)
        if: steps.lychee.outputs.exit_code != '0' && steps.flags.outputs.fail_fast != 'true'
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: documentation
