# Runs changelog related jobs.
# CI job heavily inspired by: https://github.com/tarides/changelog-check-action

name: changelog

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - next
    types: [opened, reopened, synchronize, labeled, unlabeled]

jobs:
