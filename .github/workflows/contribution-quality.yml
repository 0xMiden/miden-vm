name: Contribution Quality

# Use pull_request_target so the workflow can safely comment/label on PRs.
on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate (manual runs)"
        required: true
        type: string
      force_all:
        description: "Skip trusted/draft checks"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions: {}

jobs:
  contribution-quality-reusable:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: 0xMiden/.github/.github/workflows/contribution-quality.yml@d34ae3cd29234c5aa4d3ab57635b30563471c3c3
    with:
      pr_number: ${{ github.event.inputs.pr_number || '' }}
      force_all: ${{ github.event.inputs.force_all || 'false' }}

  gate:
    runs-on: ubuntu-latest
    needs: contribution-quality-reusable
    if: always()
    steps:
      - name: Mirror reusable workflow result
        env:
          RESULT: ${{ needs.contribution-quality-reusable.result }}
        run: |
          if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
            exit 0
          fi

          echo "Reusable contribution quality workflow concluded with $RESULT" >&2
          exit 1
