name: codspeed

on:
  push:
    branches:
      - main
      - next
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codspeed:
    name: Run CodSpeed benchmarks
    runs-on: codspeed-macro
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      CRYPTO_SMT_MEASUREMENT_TIME_MILLIS: "1000"
      CRYPTO_SMT_SAMPLE_SIZE: "10"
      CRYPTO_SMT_WARM_UP_TIME_MILLIS: "250"
      RAYON_NUM_THREADS: "8"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$(awk -F '"' '/^channel[[:space:]]*=/{ print $2; exit }' rust-toolchain.toml)"
          rustup toolchain install --profile minimal "${toolchain}"

      - name: Install LLVM/Clang
        uses: ./.github/actions/install-llvm
        with:
          version: "17"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-codspeed
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-codspeed --version 4.6.0 --locked

      - name: Build benchmarks
        shell: bash
        run: |
          set -euo pipefail
          cargo codspeed build --measurement-mode walltime --profile optimized -p miden-crypto-smt-codspeed-bench --bench smt_codspeed

      - name: Run benchmarks
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          mode: walltime
          run: cargo codspeed run --measurement-mode walltime -p miden-crypto-smt-codspeed-bench --bench smt_codspeed
