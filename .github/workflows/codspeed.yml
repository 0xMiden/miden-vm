name: codspeed

on:
  push:
    branches:
      - main
      - next
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codspeed:
    name: Run CodSpeed benchmarks
    runs-on: codspeed-macro
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      RAYON_NUM_THREADS: "8"
      SYNTH_BENCH_AXES: exec,trace_prep,prove,verify
      SYNTH_MEASUREMENT_TIME_SECS: "1"
      SYNTH_SAMPLE_SIZE: "10"
      SYNTH_WARM_UP_TIME_SECS: "1"
      SYNTH_SCENARIO: create-single-p2id-note
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$(sed -n 's/^channel = "\(.*\)"$/\1/p' rust-toolchain.toml)"
          rustup toolchain install "${toolchain}" --profile minimal --target wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-codspeed
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-codspeed --version 4.6.0 --locked

      - name: Build benchmarks
        shell: bash
        run: |
          set -euo pipefail
          cargo codspeed build --measurement-mode walltime --profile optimized -p miden-vm-synthetic-bench --bench synthetic_bench
          cargo codspeed build --measurement-mode walltime --profile optimized -p miden-crypto-smt-codspeed-bench --bench smt_codspeed

      - name: Run benchmarks
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          mode: walltime
          run: |
            cargo codspeed run --measurement-mode walltime -p miden-vm-synthetic-bench --bench synthetic_bench
            cargo codspeed run --measurement-mode walltime -p miden-crypto-smt-codspeed-bench --bench smt_codspeed
