version: 2

updates:
  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/miden-core-fuzz"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "no changelog"
    open-pull-requests-limit: 1
    groups:
      cargo-refresh:
        patterns:
          - "*"
        group-by: "dependency-name"
    cooldown:
      default-days: 7
      semver-patch-days: 7
      semver-minor-days: 7
      semver-major-days: 15

  # Action updates still have to pass actionlint and zizmor.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "no changelog"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
