name: workspace-release
description: "Dry-run or publish Rust workspace crates using cargo"

inputs:
  mode:
    description: "Release mode: dry-run or publish"
    required: true
    default: "dry-run"
  verify-main-head:
    description: "If true, ensure the triggering SHA matches main's HEAD"
    required: false
    default: "false"
  packages:
    description: "Comma, space, or newline separated packages to release. Empty publishes all publishable workspace packages."
    required: false
    default: ""
  allow_existing:
    description: "If true, exclude crate versions that already exist on crates.io and publish the remaining selected crates."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    # Optional: guard that release happens from latest main
    - name: Verify tag matches main HEAD
      if: ${{ inputs.verify-main-head == 'true' }}
      shell: bash
      run: |
        git fetch origin main --depth=1
        main_sha="$(git rev-parse origin/main)"
        tag_sha="$(git rev-parse HEAD)"

        echo "main_sha=$main_sha"
        echo "tag_sha=$tag_sha"

        if [ "$main_sha" != "$tag_sha" ]; then
          echo "::error::The release/tag commit does not match origin/main HEAD. Aborting."
          exit 1
        fi

    - name: Install Rust toolchain
      shell: bash
      run: |
        rustup update --no-self-update stable
        rustup default stable

    - name: Cache Rust build artifacts
      uses: WarpBuilds/rust-cache@9d0cc3090d9c87de74ea67617b246e978735b1a1 # v2.9.1

    - name: Cleanup large tools for build space
      uses: ./.github/actions/cleanup-runner

    # Install cargo-msrv for MSRV checks
    - name: Install cargo-msrv
      shell: bash
      run: cargo install cargo-msrv --version 0.19.3 --locked

    # Keep your existing MSRV check
    - name: Check MSRV
      shell: bash
      run: |
        chmod +x scripts/check-msrv.sh
        ./scripts/check-msrv.sh

    - name: Check MASM procedure root stability
      if: ${{ inputs.mode == 'dry-run' && github.ref == 'refs/heads/main' }}
      shell: bash
      run: |
        rustup toolchain install nightly --profile minimal --no-self-update
        chmod +x scripts/check-masm-root-stability.sh
        ./scripts/check-masm-root-stability.sh

    # Clean packaging directory to avoid stale/corrupted tmp-registry state
    - name: Clean packaging directory
      shell: bash
      run: |
        echo "Cleaning target/package directory to ensure fresh state"
        rm -rf target/package

    # Clear cargo registry to ensure fresh resolution during verification.
    # This prevents issues where cached metadata from previous runs
    # might interfere with workspace dependency feature resolution
    # during the verification step (related to cargo#14283, cargo#14789).
    # Specifically, this ensures the temp registry used during workspace
    # publish verification doesn't conflict with cached crates.io data.
    - name: Clear cargo registry for fresh resolution
      if: ${{ inputs.mode == 'dry-run' }}
      shell: bash
      run: |
        echo "Clearing cargo registry for fresh resolution"
        rm -rf ~/.cargo/registry/cache
        rm -rf ~/.cargo/registry/index
        rm -rf ~/.cargo/registry/src

    - name: Publish workspace crates
      shell: bash
      env:
        CARGO_REGISTRY_TOKEN: ${{ env.CARGO_REGISTRY_TOKEN }}
        RELEASE_MODE: ${{ inputs.mode }}
        RELEASE_PACKAGES: ${{ inputs.packages }}
        RELEASE_ALLOW_EXISTING: ${{ inputs.allow_existing }}
      run: |
        set -euo pipefail

        case "$RELEASE_MODE" in
          dry-run | publish) ;;
          *)
            echo "error: unsupported release mode '$RELEASE_MODE'; expected dry-run or publish" >&2
            exit 2
            ;;
        esac

        case "$RELEASE_ALLOW_EXISTING" in
          true | false) ;;
          *)
            echo "error: unsupported allow_existing value '$RELEASE_ALLOW_EXISTING'; expected true or false" >&2
            exit 2
            ;;
        esac

        for cmd in cargo jq; do
          if ! command -v "$cmd" >/dev/null 2>&1; then
            echo "error: required command '$cmd' is not installed or not in PATH" >&2
            exit 1
          fi
        done

        metadata_json="$(cargo metadata --locked --no-deps --format-version 1)"
        selected_packages=()

        add_packages() {
          local line word
          while IFS= read -r line; do
            line="${line%%#*}"
            line="${line//,/ }"
            for word in $line; do
              selected_packages+=("$word")
            done
          done
        }

        add_packages <<< "$RELEASE_PACKAGES"

        all_publishable_packages() {
          printf '%s' "$metadata_json" \
            | jq -r '
              . as $m
              | $m.packages[]
              | select((.id as $id | $m.workspace_members | index($id)) and .publish != [])
              | .name
            '
        }

        all_workspace_packages() {
          printf '%s' "$metadata_json" \
            | jq -r '
              . as $m
              | $m.packages[]
              | select(.id as $id | $m.workspace_members | index($id))
              | .name
            '
        }

        package_version() {
          local package="$1"
          printf '%s' "$metadata_json" \
            | jq -er --arg package "$package" '
              . as $m
              | $m.packages[]
              | select(.name == $package and (.id as $id | $m.workspace_members | index($id)))
              | select(.publish != [])
              | .version
            '
        }

        is_selected_package() {
          local package="$1"
          local selected

          for selected in "${selected_packages[@]}"; do
            if [[ "$selected" == "$package" ]]; then
              return 0
            fi
          done

          return 1
        }

        is_release_package() {
          local package="$1"

          if [[ ${#selected_packages[@]} -gt 0 ]]; then
            is_selected_package "$package"
            return
          fi

          package_version "$package" >/dev/null
        }

        selected_packages_for_checks() {
          if [[ ${#selected_packages[@]} -gt 0 ]]; then
            printf '%s\n' "${selected_packages[@]}"
          else
            all_publishable_packages
          fi
        }

        duplicate_packages="$(
          selected_packages_for_checks | sort | uniq -d
        )"
        if [[ -n "$duplicate_packages" ]]; then
          echo "error: duplicate package(s) selected:" >&2
          printf '%s\n' "$duplicate_packages" | sed 's/^/  - /' >&2
          exit 1
        fi

        for package in "${selected_packages[@]}"; do
          if ! package_version "$package" >/dev/null; then
            echo "error: '$package' is not a publishable workspace package" >&2
            echo "publishable packages:" >&2
            all_publishable_packages | sed 's/^/  - /' >&2
            exit 1
          fi
        done

        echo "Release mode: $RELEASE_MODE"
        echo "Selected packages:"
        remaining_packages=()
        already_published_packages=()

        while IFS= read -r package; do
          version="$(package_version "$package")"

          if cargo info --quiet --registry crates-io "${package}@${version}" >/dev/null 2>&1; then
            if [[ "$RELEASE_ALLOW_EXISTING" == "true" ]]; then
              echo "  - $package v$version already exists on crates.io; excluding it."
              already_published_packages+=("$package")
            else
              echo "error: $package v$version already exists on crates.io" >&2
              echo "Bump its version, remove it from the selected packages, or rerun with allow_existing=true to resume a partial publish." >&2
              exit 1
            fi
          else
            echo "  - $package v$version"
            remaining_packages+=("$package")
          fi
        done < <(selected_packages_for_checks)

        if [[ ${#remaining_packages[@]} -eq 0 ]]; then
          echo "All selected publishable crates already exist on crates.io."
          exit 0
        fi

        echo "Publishing crates that are not yet on crates.io:"
        printf '  %s\n' "${remaining_packages[@]}"

        publish_cmd=(cargo publish --workspace --locked)
        if [[ "$RELEASE_MODE" == "dry-run" ]]; then
          publish_cmd+=(--dry-run)
        fi

        while IFS= read -r package; do
          if ! is_release_package "$package"; then
            publish_cmd+=(--exclude "$package")
          fi
        done < <(all_workspace_packages)

        for package in "${already_published_packages[@]}"; do
          publish_cmd+=(--exclude "$package")
        done

        "${publish_cmd[@]}"
