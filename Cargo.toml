p3-mds = { git = "https://github.com/0xMiden/Plonky3", rev = "a2bcc68ab83eb3de886d74a4a2e28ca6433e2525" }
p3-poseidon1 = { git = "https://github.com/0xMiden/Plonky3", rev = "a2bcc68ab83eb3de886d74a4a2e28ca6433e2525" }
p3-poseidon2 = { git = "https://github.com/0xMiden/Plonky3", rev = "a2bcc68ab83eb3de886d74a4a2e28ca6433e2525" }
p3-symmetric = { git = "https://github.com/0xMiden/Plonky3", rev = "a2bcc68ab83eb3de886d74a4a2e28ca6433e2525" }
p3-util = { git = "https://github.com/0xMiden/Plonky3", rev = "a2bcc68ab83eb3de886d74a4a2e28ca6433e2525" }
p3-matrix = { git = "https://github.com/0xMiden/Plonky3", rev = "a2bcc68ab83eb3de886d74a4a2e28ca6433e2525" }
p3-maybe-rayon = { git = "https://github.com/0xMiden/Plonky3", rev = "a2bcc68ab83eb3de886d74a4a2e28ca6433e2525" }
